{% extends 'base.html' %}
{% block title %}Forgot Password - PackAndGo{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold"><i class="fas fa-truck-moving me-2"></i>PackAndGo</h2>
                </div>
                <div class="glass-card">
                    <div class="text-center mb-4">
                        <div class="stat-icon warning mx-auto mb-3"><i class="fas fa-key"></i></div>
                        <h4 class="fw-bold">Forgot Password?</h4>
                        <p class="text-muted">Enter your email and we'll send you a reset link</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter your email" required>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-primary text-decoration-none">
                            <i class="fas fa-arrow-left me-2"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
